<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Crypto - Investor Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --primary-color: #0056b3;
            --secondary-color: #00c2ff;
            --dark-color: #1a1a2e;
            --light-color: #f5f5f5;
        }

        body {
            background: linear-gradient(135deg, var(--dark-color), #000);
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }

        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            z-index: 10;
            position: relative;
            max-width: 500px;
            margin: 100px auto;
            overflow: hidden;
        }

        .login-form {
            padding: 10px 5px;
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-label-icon {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }

        .form-label-icon i {
            margin-right: 8px;
            color: var(--secondary-color);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo img {
            height: 60px;
            margin-bottom: 15px;
        }

        .logo h1 {
            color: white;
            font-size: 28px;
            font-weight: 700;
            margin: 0;
            background: linear-gradient(90deg, var(--secondary-color), var(--primary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            margin-top: 5px;
        }

        .form-control {
            background: rgba(0, 21, 42, 0.3);
            border: 1px solid rgba(0, 194, 255, 0.2);
            border-radius: 8px;
            color: #e0f7ff;
            padding: 12px 20px;
            margin-bottom: 20px;
            transition: all 0.3s;
            box-shadow: 0 0 10px rgba(0, 194, 255, 0.1);
            backdrop-filter: blur(5px);
            height: 50px;
            font-size: 15px;
        }

        .form-control::placeholder {
            color: rgba(176, 224, 255, 0.3);
        }

        .form-control::selection {
            background: rgba(0, 194, 255, 0.3);
            color: white;
        }

        .form-control:focus {
            background: rgba(0, 37, 73, 0.5);
            border-color: var(--secondary-color);
            box-shadow: 0 0 20px rgba(0, 194, 255, 0.3), inset 0 0 10px rgba(0, 194, 255, 0.1);
            transform: translateY(-2px);
            color: white;
        }

        .form-label {
            color: rgba(255, 255, 255, 0.8);
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .btn-login {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            padding: 12px 30px;
            transition: all 0.3s ease-out;
            width: 100%;
            margin-top: 15px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            letter-spacing: 0.5px;
            z-index: 1;
            font-size: 16px;
            cursor: pointer;
        }

        .btn-login:before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: 0.5s;
            z-index: -1;
        }

        .btn-login:hover:before {
            left: 100%;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }

        .btn-login i {
            margin-right: 8px;
            font-size: 18px;
        }

        .alert {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.3);
            color: #ff6b6b;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: none;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group-text {
            background: rgba(0, 48, 93, 0.5);
            border: 1px solid rgba(0, 194, 255, 0.2);
            border-right: none;
            color: var(--secondary-color);
            padding-left: 15px;
            padding-right: 15px;
            border-radius: 8px 0 0 8px;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
            width: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .input-group-text i {
            font-size: 16px;
            text-shadow: 0 0 10px rgba(0, 194, 255, 0.5);
        }

        .input-group .form-control {
            border-radius: 8px;
            margin-bottom: 0;
            padding-left: 20px;
        }

        .input-group:focus-within .input-group-text {
            border-color: var(--secondary-color);
            box-shadow: -5px 0 10px rgba(0, 194, 255, 0.1);
            color: #ffffff;
        }

        .input-group::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 8px;
            box-shadow: 0 0 0 0 rgba(0, 194, 255, 0);
            transition: box-shadow 0.3s ease;
            pointer-events: none;
        }

        .input-group:focus-within::after {
            box-shadow: 0 0 0 2px rgba(0, 194, 255, 0.3);
        }

        .input-group:hover .form-control,
        .input-group:hover .input-group-text {
            border-color: rgba(0, 194, 255, 0.3);
        }

        .form-control:focus {
            caret-color: var(--secondary-color);
        }

        input[type="text"], input[type="password"], input[type="email"] {
            background: rgba(0, 21, 42, 0.3) !important;
            border: 1px solid rgba(0, 194, 255, 0.2) !important;
            border-radius: 8px !important;
            color: #e0f7ff !important;
            height: 50px !important;
            box-shadow: 0 0 10px rgba(0, 194, 255, 0.1) !important;
            backdrop-filter: blur(5px) !important;
            padding: 12px 20px !important;
            width: 100% !important;
            transition: all 0.3s !important;
        }

        input[type="text"]:focus, input[type="password"]:focus, input[type="email"]:focus {
            background: rgba(0, 37, 73, 0.5) !important;
            border-color: var(--secondary-color) !important;
            box-shadow: 0 0 20px rgba(0, 194, 255, 0.3), inset 0 0 10px rgba(0, 194, 255, 0.1) !important;
            color: white !important;
            outline: none !important;
        }

        .glow {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: var(--primary-color);
            filter: blur(150px);
            opacity: 0.15;
            z-index: 0;
        }

        .glow-1 {
            top: -200px;
            left: -100px;
        }

        .glow-2 {
            bottom: -200px;
            right: -100px;
            background: var(--secondary-color);
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 13px;
            transition: color 0.3s;
        }

        .back-link a:hover {
            color: var(--secondary-color);
        }

        @media (max-width: 768px) {
            .login-container {
                margin: 50px 20px;
                padding: 30px 20px;
                max-width: 100%;
            }

            .logo h1 {
                font-size: 24px;
            }

            .logo p {
                font-size: 12px;
            }

            .particles {
                opacity: 0.5;
            }

            .form-group {
                margin-bottom: 20px;
            }

            .btn-login {
                padding: 10px 20px;
            }

            .glow {
                opacity: 0.1;
            }
        }

        @media (max-width: 480px) {
            .login-container {
                margin: 30px 15px;
                padding: 25px 15px;
            }

            .logo h1 {
                font-size: 20px;
            }

            body {
                background: linear-gradient(145deg, var(--dark-color), #000);
            }

            .form-control, .input-group-text, input[type="text"], input[type="password"] {
                height: 45px !important;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles-js"></div>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8">
                <div class="login-container">
                    <div class="logo">
                        <h1>QUANTUM CRYPTO</h1>
                        <p>Investor Portal</p>
                    </div>

                    <div class="alert" id="login-error">
                        <i class="fas fa-exclamation-circle me-2"></i>
                        Invalid credentials. Please check your username and password.
                    </div>

                    <form method="post" action="#" class="login-form mt-4" onsubmit="return handleLogin(event)">
                        <div class="form-group">
                            <div class="form-label-icon">
                                <i class="fas fa-user"></i>
                                <label for="username" class="form-label">Username</label>
                            </div>
                            <div class="input-group">
                                <input type="text" id="username" name="username" placeholder="Enter your username" autocomplete="username">
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="form-label-icon">
                                <i class="fas fa-lock"></i>
                                <label for="password" class="form-label">Password</label>
                            </div>
                            <div class="input-group">
                                <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password">
                            </div>
                        </div>
                        <button type="submit" class="btn-login">
                            <i class="fas fa-sign-in-alt"></i>
                            <span>Secure Login</span>
                        </button>
                    </form>

                    <div class="back-link">
                        <a href="/quantumcrypto/"><i class="fas fa-arrow-left me-1"></i> Back to Quantum Crypto</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const isMobile = window.innerWidth <= 768;

            particlesJS('particles-js', {
                particles: {
                    number: {
                        value: isMobile ? 40 : 80,
                        density: { enable: true, value_area: 800 }
                    },
                    color: { value: '#00c2ff' },
                    shape: { type: 'circle' },
                    opacity: { value: 0.5, random: true },
                    size: { value: isMobile ? 2 : 3, random: true },
                    line_linked: {
                        enable: true,
                        distance: isMobile ? 100 : 150,
                        color: '#00c2ff',
                        opacity: 0.2,
                        width: 1
                    },
                    move: {
                        enable: true,
                        speed: isMobile ? 0.8 : 1,
                        direction: 'none',
                        random: true,
                        straight: false,
                        out_mode: 'out',
                        bounce: false
                    }
                },
                interactivity: {
                    detect_on: 'canvas',
                    events: {
                        onhover: { enable: true, mode: 'grab' },
                        onclick: { enable: true, mode: 'push' },
                        resize: true
                    },
                    modes: {
                        grab: { distance: isMobile ? 100 : 140, line_linked: { opacity: 0.5 } },
                        push: { particles_nb: isMobile ? 2 : 4 }
                    }
                },
                retina_detect: true
            });

            window.addEventListener('resize', function() {
                setTimeout(function() {
                    if ((window.innerWidth <= 768 && !isMobile) ||
                        (window.innerWidth > 768 && isMobile)) {
                        window.pJSDom[0].pJS.fn.vendors.destroypJS();
                        window.pJSDom = [];
                        particlesJS('particles-js', {
                            particles: {
                                number: {
                                    value: window.innerWidth <= 768 ? 40 : 80,
                                    density: { enable: true, value_area: 800 }
                                },
                                color: { value: '#00c2ff' },
                                shape: { type: 'circle' },
                                opacity: { value: 0.5, random: true },
                                size: { value: window.innerWidth <= 768 ? 2 : 3, random: true },
                                line_linked: {
                                    enable: true,
                                    distance: window.innerWidth <= 768 ? 100 : 150,
                                    color: '#00c2ff',
                                    opacity: 0.2,
                                    width: 1
                                },
                                move: {
                                    enable: true,
                                    speed: window.innerWidth <= 768 ? 0.8 : 1,
                                    direction: 'none',
                                    random: true,
                                    straight: false,
                                    out_mode: 'out',
                                    bounce: false
                                }
                            },
                            interactivity: {
                                detect_on: 'canvas',
                                events: {
                                    onhover: { enable: true, mode: 'grab' },
                                    onclick: { enable: true, mode: 'push' },
                                    resize: true
                                },
                                modes: {
                                    grab: { distance: window.innerWidth <= 768 ? 100 : 140, line_linked: { opacity: 0.5 } },
                                    push: { particles_nb: window.innerWidth <= 768 ? 2 : 4 }
                                }
                            },
                            retina_detect: true
                        });
                    }
                }, 500);
            });
        });

        function handleLogin(e) {
            e.preventDefault();
            var errorDiv = document.getElementById('login-error');
            errorDiv.style.display = 'block';
            return false;
        }
    </script>
</body>
</html>
